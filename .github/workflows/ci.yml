name: CI - Testes Unificados Agibank

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    name: "🧪 Execução de Testes Full Stack"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Instalar Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # MUDANÇA AQUI: Adicionado 'verify' para gerar o HTML do JMeter
      - name: Executar Automação (Web, API e Performance)
        run: |
          mvn clean test
          mvn verify -pl teste-performance
        continue-on-error: true

      - name: Unificar Resultados Allure
        if: always()
        run: |
          mkdir -p all-results
          find . -type d -name "allure-results" -not -path "./all-results/*" -exec cp -r {}/. all-results/ \;

      - name: Carregar histórico do Allure (gh-pages)
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Allure Report Action
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure_report
        with:
          allure_results: "all-results"
          gh_pages: gh-pages-dir
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      # AJUSTE NA PERMISSÃO E NO CAMINHO
      - name: Integrar Relatório JMeter
        if: always()
        run: |
          # Damos permissão na pasta que o Allure gerou
          sudo chmod -R 777 allure-report
          mkdir -p allure-report/performance
          
          # Verifica se o relatório foi gerado e copia
          if [ -d "teste-performance/target/jmeter/reports/blazedemo_test" ]; then
            cp -r teste-performance/target/jmeter/reports/blazedemo_test/* allure-report/performance/
            echo "Relatório JMeter copiado para allure-report/performance/"
          else
            echo "ERRO: Relatório JMeter não encontrado. Verifique se o comando 'mvn verify' rodou."
            exit 1
          fi

          # Sincroniza com a pasta de histórico para o deploy final
          sudo chmod -R 777 allure-history
          CURRENT_RUN=$(ls -t allure-history | head -n 1)
          mkdir -p allure-history/$CURRENT_RUN/performance
          cp -r allure-report/performance/* allure-history/$CURRENT_RUN/performance/

      - name: Deploy para GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history