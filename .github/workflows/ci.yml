name: CI - Testes Unificados Agibank

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    name: "🧪 Execução de Testes Full Stack"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Instalar Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Executar Automação (Web, API e Performance)
        run: |
            mvn clean test
          # Força a execução e geração do relatório dentro do módulo
          cd teste-performance && mvn verify
        continue-on-error: true

      - name: Unificar Resultados Allure
        if: always()
        run: |
          mkdir -p all-results
          find . -type d -name "allure-results" -not -path "./all-results/*" -exec cp -r {}/. all-results/ \;

      - name: Carregar histórico do Allure (gh-pages)
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Allure Report Action
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure_report
        with:
          allure_results: "all-results"
          gh_pages: gh-pages-dir
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Integrar Relatório JMeter
        if: always()
        run: |
          # 1. Busca dinâmica por QUALQUER index.html gerado pelo JMeter
           REPORT_HTML=$(find . -path "*/target/jmeter/reports/*/index.html" | head -n 1)
            
           if [ -n "$REPORT_HTML" ]; then
             REPORT_DIR=$(dirname "$REPORT_HTML")
             echo "Relatório JMeter localizado em: $REPORT_DIR"
            
            # 2. Garante permissões
             sudo chmod -R 777 allure-report allure-history
            
            # 3. Injeta na raiz do report atual
            mkdir -p allure-report/performance
            cp -r $REPORT_DIR/* allure-report/performance/
            
           # 4. Injeta na pasta numerada do histórico (ex: /36/performance)
          CURRENT_RUN=$(ls -t allure-history | grep -E '^[0-9]+$' | head -n 1)
          if [ -n "$CURRENT_RUN" ]; then
            mkdir -p allure-history/$CURRENT_RUN/performance
            cp -r allure-report/performance/* allure-history/$CURRENT_RUN/performance/
            echo "Sucesso: Relatório injetado na run #$CURRENT_RUN"
          fi
          else
           echo "ERRO: O relatório do JMeter (index.html) não foi gerado em nenhuma pasta target."
           # Diagnóstico: lista o que foi gerado
           find . -maxdepth 4 -name "target"
           exit 1
           fi
      - name: Deploy para GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history