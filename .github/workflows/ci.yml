name: CI - Testes Unificados Agibank

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    name: "🧪 Execução de Testes Full Stack"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Instalar Chrome (para o módulo Web)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Executar todos os módulos
        run: mvn clean test

      - name: Gerar relatório Allure Unificado
        if: always()
        run: mvn allure:report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-unificado-allure
          path: "**/target/site/allure-maven-plugin/"